<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUNE STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:#f4f1ec;min-height:100vh;display:flex;justify-content:center;padding:60px 24px;color:#1a1a1a;-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:440px;text-align:center;}
.logo{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:500;letter-spacing:8px;margin-bottom:6px;text-transform:uppercase;}
.tagline{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#8a857d;margin-bottom:10px;font-weight:300;}
.intro{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:#4a463f;line-height:1.5;margin-bottom:44px;font-weight:400;}
.divider{width:40px;height:1px;background:#1a1a1a;margin:0 auto 44px;}
.links{display:flex;flex-direction:column;gap:14px;}
.link{display:block;padding:18px 24px;background:transparent;border:1px solid #1a1a1a;text-decoration:none;color:#1a1a1a;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:400;transition:all .35s ease;}
.link:hover{background:#1a1a1a;color:#f4f1ec;letter-spacing:3.5px;}
.link .sub{display:block;font-size:9px;letter-spacing:1.5px;color:#a09a90;margin-top:4px;font-weight:300;}
.link:hover .sub{color:#cfc8bc;}
footer{margin-top:48px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#b3ada3;font-weight:300;}
</style>
</head>
<body>
<div class="wrap">
<div class="logo">June Studio</div>
<div class="tagline">Bangkok</div>
<p class="intro">Fashion Store</p>
<div class="divider"></div>
<div class="links">
<a class="link" href="https://th.shp.ee/p4UyE4go" target="_blank" rel="noopener">Shop on Shopee<span class="sub">Browse the collection</span></a>
<a class="link" href="https://www.tiktok.com/@junestudioth" target="_blank" rel="noopener">TikTok<span class="sub">@junestudioth</span></a>
<a class="link" href="https://www.instagram.com/junestudio_th/" target="_blank" rel="noopener">Instagram<span class="sub">@junestudio_th</span></a>
<a class="link" href="https://line.me/ti/p/~Junestudio_th" target="_blank" rel="noopener">Line<span class="sub">Junestudio_th</span></a>
</div>
<footer>&copy; June Studio</footer>
</div>
</body>
</html>
